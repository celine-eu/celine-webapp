# Dumpster configuration

extensions:
  - .py
  - .md
  - .json
  - .yaml
  - .toml

dumps:
  - name: all
    contents:
      - src
      - tests
      - alembic
      - README.md
      - pyproject.toml
      - Dockerfile
      - docker-compose.yaml

  - name: backend
    contents:
      - src
      - tests
      - alembic
      - README.md
      - pyproject.toml
